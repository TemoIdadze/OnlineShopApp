<header class="gromuse-header">
  <nav class="header-nav">
    <div class="header-container">

      <!-- Left Section: Menu + Logo + Categories -->
      <div class="header-left">
        <!-- Mobile Menu Button -->
        <button class="menu-toggle" type="button" (click)="mobileMenuOpen = !mobileMenuOpen">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>

        <!-- Logo -->
        <a routerLink="/" class="logo-link">
          <span class="logo-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
          </span>
          <span class="logo-text">MyShop</span>
        </a>

        <!-- Categories Dropdown Trigger -->
        <div class="categories-menu" (mouseenter)="openMegaMenu()" (mouseleave)="closeMegaMenu()">
          <button class="categories-trigger" [class.active]="megaMenuOpen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1"></rect>
              <rect x="14" y="3" width="7" height="7" rx="1"></rect>
              <rect x="3" y="14" width="7" height="7" rx="1"></rect>
              <rect x="14" y="14" width="7" height="7" rx="1"></rect>
            </svg>
            <span>Categories</span>
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>

          <!-- Mega Menu Dropdown -->
          <div class="categories-dropdown" [class.open]="megaMenuOpen">
            <div class="mega-menu-container">
              <!-- Categories List -->
              <div class="mega-menu-categories">
                <div class="mega-menu-title">All Categories</div>
                <div class="category-list">
                  <button
                    *ngFor="let category of categories"
                    class="category-item"
                    [class.active]="hoveredCategory?.id === category.id"
                    (mouseenter)="hoverCategory(category)"
                    (click)="navigateToCategory(category.id)">
                    <span class="category-emoji">{{ getCategoryEmoji(category.name) }}</span>
                    <span class="category-name">{{ category.name }}</span>
                    <svg class="category-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                  </button>
                </div>
                <a routerLink="/products" class="view-all-link" (click)="closeMegaMenu()">
                  View All Products
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                  </svg>
                </a>
              </div>

              <!-- Products Preview -->
              <div class="mega-menu-products">
                <div class="products-header" *ngIf="hoveredCategory">
                  <span class="products-title">{{ hoveredCategory.name }}</span>
                  <button class="see-all-btn" (click)="navigateToCategory(hoveredCategory.id)">
                    See all
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <line x1="5" y1="12" x2="19" y2="12"></line>
                      <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                  </button>
                </div>
                <div class="products-grid" *ngIf="categoryProducts.length > 0">
                  <button
                    *ngFor="let product of categoryProducts"
                    class="product-card"
                    (click)="navigateToProduct(product)">
                    <div class="product-image">
                      <img [src]="getProductImageUrl(product)" [alt]="product.name" loading="lazy">
                    </div>
                    <div class="product-info">
                      <span class="product-name">{{ product.name }}</span>
                      <span class="product-price">${{ product.price | number:'1.2-2' }}</span>
                    </div>
                  </button>
                </div>
                <div class="no-products" *ngIf="categoryProducts.length === 0 && hoveredCategory">
                  <span class="no-products-emoji">📦</span>
                  <span>No products in this category</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Center: Search Bar -->
      <div class="header-center">
        <form class="search-wrapper" (ngSubmit)="onSearch()">
          <span class="search-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
          <input
            type="text"
            [(ngModel)]="searchQuery"
            name="search"
            placeholder="Search products..."
            class="search-field"
            (input)="onSearchInput()"
            (focus)="onSearchFocus()"
            autocomplete="off">
          <button type="button" class="search-clear" *ngIf="searchQuery" (click)="clearSearch()" aria-label="Clear search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
          <button type="submit" class="search-submit" *ngIf="searchQuery">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>

          <!-- Search Autocomplete Dropdown -->
          <div class="search-suggestions" *ngIf="showSuggestions && searchSuggestions.length > 0">
            <div class="suggestion-item" *ngFor="let product of searchSuggestions" (click)="selectSuggestion(product)">
              <div class="suggestion-image">
                <img [src]="product.imageUrl" [alt]="product.name" loading="lazy">
              </div>
              <div class="suggestion-info">
                <span class="suggestion-name">{{ product.name }}</span>
                <span class="suggestion-price">${{ product.price.toFixed(2) }}</span>
              </div>
            </div>
          </div>
        </form>
      </div>

      <!-- Right Section: Cart + User -->
      <div class="header-right">
        <!-- Dark Mode Toggle -->
        <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
          <!-- Sun Icon (shown in dark mode) -->
          <svg *ngIf="themeService.isDarkMode()" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
          </svg>
          <!-- Moon Icon (shown in light mode) -->
          <svg *ngIf="!themeService.isDarkMode()" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
          </svg>
        </button>

        <!-- Cart Button -->
        <a routerLink="/cart" class="cart-button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
          </svg>
          <span class="cart-count">{{cartItemCount}}</span>
        </a>

        <!-- User Avatar/Auth -->
        <div class="user-section" *ngIf="!(isLoggedIn$ | async)">
          <a routerLink="/login" class="user-avatar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
          </a>
        </div>
        <div class="user-section" *ngIf="isLoggedIn$ | async">
          <button class="user-avatar user-avatar--active" (click)="logout()">
            <span class="avatar-initial">{{ userInitial }}</span>
          </button>
        </div>
      </div>

    </div>

    <!-- Mobile Search & Navigation -->
    <div class="mobile-dropdown" [class.open]="mobileMenuOpen">
      <form class="mobile-search" (ngSubmit)="onSearch()">
        <input
          type="text"
          [(ngModel)]="searchQuery"
          name="mobileSearch"
          placeholder="Search products..."
          class="search-field"
          (input)="onSearchInput()"
          (focus)="onSearchFocus()"
          autocomplete="off">
        <button type="button" class="search-clear" *ngIf="searchQuery" (click)="clearSearch()" aria-label="Clear search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <button type="submit" class="search-submit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>

        <!-- Mobile Search Autocomplete Dropdown -->
        <div class="search-suggestions" *ngIf="showSuggestions && searchSuggestions.length > 0">
          <div class="suggestion-item" *ngFor="let product of searchSuggestions" (click)="selectSuggestion(product)">
            <div class="suggestion-image">
              <img [src]="product.imageUrl" [alt]="product.name" loading="lazy">
            </div>
            <div class="suggestion-info">
              <span class="suggestion-name">{{ product.name }}</span>
              <span class="suggestion-price">${{ product.price.toFixed(2) }}</span>
            </div>
          </div>
        </div>
      </form>
      <nav class="mobile-nav">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="mobileMenuOpen = false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          Home
        </a>
        <a routerLink="/products" routerLinkActive="active" (click)="mobileMenuOpen = false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l4.59-4.58L18 11l-6 6z"/></svg>
          Products
        </a>
        <a routerLink="/cart" routerLinkActive="active" (click)="mobileMenuOpen = false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
          Cart
        </a>
      </nav>
    </div>
  </nav>
</header>
